name: Plugin Developer Partnership Request
description: Request to integrate your plugin with Pluginator's update system
labels: ["partnership"]
body:
  - type: markdown
    attributes:
      value: |
        ## Plugin Developer Partnership Request

        Thank you for your interest in partnering with Pluginator! This form helps us
        understand your plugin and how we can best integrate it with our update checking system.

        **What you'll get:**
        - Your plugin listed in Pluginator's curated registry
        - Update notifications for your users
        - Increased visibility to Pluginator's user base

        **What we need from you:**
        - Basic plugin information
        - A way to check for updates (manifest file or webhook)
        - Your users are still directed to your marketplace for downloads

        > **Prefer to submit this privately?** Join the
        > [Nindroid Systems Development Server](https://discord.gg/nindroid) on Discord
        > and open a Dev Partner application there instead.

  - type: input
    id: developer-name
    attributes:
      label: Developer/Studio Name
      description: Your username, studio name, company name, etc
      placeholder: "e.g., GuyMoon, user_name"
    validations:
      required: true

  - type: input
    id: plugin-name
    attributes:
      label: Plugin Name
      description: The name of your plugin
      placeholder: "e.g., CMI, Geyser, WorldEdit"
    validations:
      required: true

  - type: dropdown
    id: marketplace
    attributes:
      label: Primary Marketplace
      description: Where is your plugin primarily sold or distributed?
      options:
        - SpigotMC
        - Modrinth
        - Hangar
        - Polymart
        - BuiltByBit (MC-Market)
        - CurseForge
        - Other
    validations:
      required: true

  - type: input
    id: plugin-url
    attributes:
      label: Plugin URL
      description: Link to your plugin's marketplace page (we'll grab version info, description, etc. from here)
      placeholder: "https://www.spigotmc.org/resources/cmi.3742/"
    validations:
      required: true

  - type: dropdown
    id: integration-method
    attributes:
      label: Preferred Integration Method
      description: How should Pluginator check for updates?
      options:
        - Not sure (Let's discuss)
        - NinSys-Hosted (We host the manifest, you notify us of releases)
        - Self-Hosted Manifest (You host a JSON file we check)
        - Webhook (You send us release notifications)
    validations:
      required: true

  - type: textarea
    id: technical-details
    attributes:
      label: Technical Details (Optional)
      description: Any existing version API, manifest URL, or technical notes relevant to integration
      placeholder: "e.g., We have a version API at https://api.example.com/version"

  - type: input
    id: discord-tag
    attributes:
      label: Discord Tag (Optional)
      description: Your Discord username, in case we need to reach out
      placeholder: "e.g., nindroid"

  - type: textarea
    id: additional-info
    attributes:
      label: Anything Else? (Optional)
      description: Other details, questions, or context
      placeholder: "e.g., We release weekly, we'd love to cross-promote, etc."

  - type: checkboxes
    id: terms
    attributes:
      label: Agreement
      description: Please confirm the following
      options:
        - label: I understand that Pluginator provides update notifications and directs users to my marketplace for downloads
          required: true
        - label: I am authorized to represent this plugin for partnership purposes
          required: true
